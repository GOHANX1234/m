workflows:

  # ── Debug build (every push to develop / feature branches) ───────────────
  android-debug:
    name: M&A – Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      # No dashboard signing identities or env-var groups needed.
      # All credentials are defined inline below.
      java: 17
      vars:
        PACKAGE_NAME: "com.mna.streaming"

        # ── Keystore (PKCS12) ─────────────────────────────────────────────
        # Generated with OpenSSL; base64-encoded so it travels safely in YAML.
        # The build script decodes it to keystore/ma_release.p12 before Gradle runs.
        KEY_ALIAS: "ma_key"
        KEY_STORE_PASSWORD: "Ma@Streaming2024"
        KEY_PASSWORD: "Ma@Streaming2024"
        KEYSTORE_BASE64: ""

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "develop"
          include: true
        - pattern: "feature/*"
          include: true

    scripts:
      - name: Decode keystore
        script: |
          mkdir -p "$CM_BUILD_DIR/keystore"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$CM_BUILD_DIR/keystore/ma_release.p12"

      - name: Write local.properties
        script: |
          # On macOS (CodeMagic mac_mini) the Android SDK lives at a fixed full path.
          # $ANDROID_SDK_ROOT is set automatically by the CodeMagic runner to that path.
          # Gradle on Mac requires an absolute path — a relative path or shell variable
          # inside local.properties will NOT expand and the build will fail.
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > "$CM_BUILD_DIR/local.properties"

      - name: Download gradle-wrapper.jar
        script: |
          mkdir -p "$CM_BUILD_DIR/gradle/wrapper"
          curl -fL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o "$CM_BUILD_DIR/gradle/wrapper/gradle-wrapper.jar"

      - name: Make gradlew executable
        script: chmod +x "$CM_BUILD_DIR/gradlew"

      - name: Build debug APK
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleDebug \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_STORE_PASSWORD="$KEY_STORE_PASSWORD" \
            -PKEY_PASSWORD="$KEY_PASSWORD" \
            --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - fghghif14@gmail.com
        notify:
          success: true
          failure: true


  # ── Release build (triggered by vX.Y.Z tags) ────────────────────────────
  android-release:
    name: M&A – Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      java: 17
      vars:
        PACKAGE_NAME: "com.mna.streaming"

        KEY_ALIAS: "ma_key"
        KEY_STORE_PASSWORD: "Ma@Streaming2024"
        KEY_PASSWORD: "Ma@Streaming2024"
        KEYSTORE_BASE64: ""

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Decode keystore
        script: |
          mkdir -p "$CM_BUILD_DIR/keystore"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$CM_BUILD_DIR/keystore/ma_release.p12"

      - name: Write local.properties
        script: |
          # CodeMagic's mac_mini_m2 runner sets $ANDROID_SDK_ROOT to the full
          # absolute path of the SDK (e.g. /usr/local/share/android-sdk).
          # On macOS, local.properties MUST contain the full absolute path —
          # shell variables are not expanded by Gradle's properties loader.
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > "$CM_BUILD_DIR/local.properties"

      - name: Download gradle-wrapper.jar
        script: |
          mkdir -p "$CM_BUILD_DIR/gradle/wrapper"
          curl -fL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o "$CM_BUILD_DIR/gradle/wrapper/gradle-wrapper.jar"

      - name: Make gradlew executable
        script: chmod +x "$CM_BUILD_DIR/gradlew"

      - name: Run unit tests
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew test --stacktrace

      - name: Build release AAB
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew bundleRelease \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_STORE_PASSWORD="$KEY_STORE_PASSWORD" \
            -PKEY_PASSWORD="$KEY_PASSWORD" \
            --stacktrace

      - name: Build release APK (side-load)
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleRelease \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_STORE_PASSWORD="$KEY_STORE_PASSWORD" \
            -PKEY_PASSWORD="$KEY_PASSWORD" \
            --stacktrace

    artifacts:
      - app/build/outputs/bundle/release/*.aab
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - fghghif14@gmail.com
        notify:
          success: true
          failure: true
