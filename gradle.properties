# Project-wide Gradle settings.

# AndroidX
android.useAndroidX=true

# Suppress the AGP/compileSdk mismatch warning (AGP 8.5.2 tested to 34, we target 35)
android.suppressUnsupportedCompileSdk=35,36

# Kotlin code style
kotlin.code.style=official

# Enables namespacing of each library's R class so R classes are not transitive
android.nonTransitiveRClass=true

# Gradle JVM heap
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable Gradle configuration cache for faster subsequent builds
org.gradle.configuration-cache=true
